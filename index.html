<!DOCTYPE html>
<html lang="ko" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f6f3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tango">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-92L9TR91PS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-92L9TR91PS');

<title>単語帳 · Tango</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg:       #f7f6f3;
    --surface:  #ffffff;
    --card:     #ffffff;
    --card-ho:  #f1efea;
    --accent:   #e8645a;
    --gold:     #c8920a;
    --text:     #2b2833;
    --muted:    rgba(43,40,51,0.5);
    --border:   rgba(0,0,0,0.10);
    --radius:   14px;
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Noto Sans JP', -apple-system, sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── header ── */
  .header {
    padding: 28px 24px 0;
    max-width: 720px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
  .logo span { color: var(--accent); }
  .logo small { font-size: 12px; font-weight: 300; color: var(--muted); margin-left: 8px; letter-spacing: .08em; }

  .header-right { display:flex; gap:8px; align-items:center; }

  /* ── tabs ── */
  .tabs {
    max-width: 720px; margin: 20px auto 0;
    padding: 0 24px;
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 9px 18px; font-size: 13px; font-weight: 600;
    color: var(--muted); border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .15s, border-color .15s; letter-spacing: .04em;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── toolbar ── */
  .toolbar {
    max-width: 720px; margin: 16px auto 0;
    padding: 0 24px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap {
    flex: 1; min-width: 180px; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 9px 14px 9px 36px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; color: var(--text); font-size: 13px;
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: rgba(0,0,0,0.22); }
  .search-wrap::before {
    content: '🔍'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); font-size: 13px; pointer-events: none;
  }
  .filter-btn {
    padding: 8px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; transition: all .15s; letter-spacing: .04em;
  }
  .filter-btn.active {
    background: rgba(240,192,64,0.18); border-color: var(--gold); color: var(--gold);
  }

  /* ── stats bar ── */
  .stats {
    max-width: 720px; margin: 12px auto 0;
    padding: 0 24px;
    display: flex; gap: 16px;
  }
  .stat { font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); font-weight: 700; }

  /* ── cards grid ── */
  .cards {
    max-width: 720px; margin: 16px auto 0;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px 16px 14px;
    cursor: pointer; position: relative;
    transition: transform .15s, border-color .15s, background .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .card:hover { transform: translateY(-2px); background: var(--card-ho); }
  .card.starred { border-color: rgba(240,192,64,0.40); }

  .card-word {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: .02em;
    line-height: 1.2;
  }
  .card-reading {
    font-size: 11px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: .06em; min-height: 14px;
  }
  .card-meaning {
    font-size: 14px; color: rgba(43,40,51,0.80); margin-top: 2px;
    line-height: 1.4;
  }
  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .card-date { font-size: 10px; color: var(--muted); }
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 2px;
    opacity: 0.4; transition: opacity .15s, transform .15s;
  }
  .star-btn:hover { opacity: 1; transform: scale(1.2); }
  .card.starred .star-btn { opacity: 1; }
  .card-actions { display: flex; align-items: center; gap: 2px; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; line-height: 1; padding: 2px;
    opacity: 0.3; transition: opacity .15s, transform .15s, color .15s;
  }
  .del-btn:hover { opacity: 1; transform: scale(1.2); }

  .card-level {
    position: absolute; top: 12px; right: 14px;
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    padding: 2px 7px; border-radius: 999px;
    background: rgba(0,0,0,0.06); color: var(--muted);
  }

  /* ── empty state ── */
  .empty {
    max-width: 720px; margin: 60px auto;
    text-align: center; color: var(--muted);
    padding: 0 24px;
  }
  .empty p { font-size: 14px; line-height: 1.8; }
  .empty .cmd {
    display: inline-block; margin-top: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    font-family: monospace; font-size: 13px; color: var(--accent);
  }

  /* ── history tab ── */
  .history-list {
    max-width: 720px; margin: 16px auto 0;
    padding: 0 24px; display: flex; flex-direction: column; gap: 8px;
  }
  .history-item {
    background: var(--surface); border-radius: 10px;
    border: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .history-word { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; }
  .history-meaning { font-size: 13px; color: var(--muted); }
  .history-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .history-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 700;
    letter-spacing: .06em;
  }
  .badge-add    { background: rgba(46,158,79,0.14); color: #2e9e4f; }
  .badge-star   { background: rgba(240,192,64,0.15);  color: var(--gold); }
  .badge-unstar { background: rgba(0,0,0,0.06); color: var(--muted); }
  .badge-del    { background: rgba(232,100,90,0.14); color: var(--accent); }

  /* ── pill button (공통) ── */
  .pill {
    padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; letter-spacing: .04em;
    transition: background .15s;
  }
  .pill:hover { background: var(--card-ho); }
  .pill.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  /* ── loading ── */
  .loading {
    max-width: 720px; margin: 60px auto; text-align: center;
    color: var(--muted); font-size: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px;
  }

  /* ── setup banner ── */
  .setup-banner {
    max-width: 720px; margin: 16px auto 0; padding: 0 24px;
  }
  .setup-banner .inner {
    background: rgba(232,100,90,0.10); border: 1px solid rgba(232,100,90,0.30);
    border-radius: var(--radius); padding: 16px 20px;
    font-size: 13px; line-height: 1.7; color: rgba(43,40,51,0.72);
  }
  .setup-banner code {
    background: rgba(0,0,0,0.06); border-radius: 4px;
    padding: 1px 6px; font-family: monospace; color: var(--accent);
  }

  /* ── config modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-bg.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 28px 28px 24px;
    width: min(440px, 92vw); transform: translateY(10px);
    transition: transform .2s;
  }
  .modal-bg.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 20px; letter-spacing: .04em; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: .08em; margin-bottom: 6px; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
  }
  .field input:focus { border-color: rgba(0,0,0,0.22); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── 외우기(flashcard) 모드 ── */
  .study { max-width: 560px; margin: 18px auto 0; padding: 0 24px; }
  .study-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .study-bar .count { margin-left: auto; font-size: 13px; color: var(--muted); }
  .study-bar .count strong { color: var(--text); font-weight: 700; }
  .flashcard { position: relative; width: 100%; min-height: 320px; perspective: 1400px; cursor: pointer; user-select: none; }
  .flashcard-inner { position: relative; width: 100%; min-height: 320px; transition: transform .5s; transform-style: preserve-3d; }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 32px; text-align: center;
  }
  .face.back { transform: rotateY(180deg); background: var(--card-ho); }
  .fc-word { font-family: 'Noto Sans JP', sans-serif; font-size: 48px; font-weight: 700; line-height: 1.15; }
  .fc-reading { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; color: var(--muted); letter-spacing: .06em; }
  .fc-meaning { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .fc-level { position: absolute; top: 16px; right: 18px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: rgba(0,0,0,0.06); color: var(--muted); }
  .fc-star { position: absolute; top: 12px; left: 14px; background: none; border: none; cursor: pointer; font-size: 22px; line-height: 1; opacity: .45; transition: opacity .15s, transform .15s; }
  .fc-star:hover { opacity: 1; transform: scale(1.15); }
  .fc-star.on { opacity: 1; }
  .fc-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .study-nav { display: flex; gap: 10px; margin-top: 18px; }
  .nav-btn {
    flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    cursor: pointer; transition: background .15s;
  }
  .nav-btn:hover { background: var(--card-ho); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .nav-btn.flip { background: var(--accent); border-color: var(--accent); color: #fff; flex: 1.3; }
  .study-done { text-align: center; color: var(--muted); padding: 60px 24px; font-size: 14px; }
</style>
</head>
<body>

<!-- Config Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>⚙️ 연결 설정</h2>
    <div class="field">
      <label>Apps Script URL</label>
      <input id="cfg-gas-url" placeholder="https://script.google.com/macros/s/..." />
    </div>
    <p style="font-size:11px;color:var(--muted);line-height:1.6;margin:-6px 0 4px">
      기본값이 내장돼 있어 보통 비워둬도 됩니다. 다른 시트를 연결할 때만 바꾸세요.
    </p>
    <div class="modal-btns">
      <button class="pill" onclick="closeModal()">취소</button>
      <button class="pill primary" onclick="saveConfig()">저장</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">単語帳<span>·</span>Tango <small>JP VOCAB</small></div>
  <div class="header-right">
    <button class="pill" onclick="openModal()" title="설정">⚙️</button>
    <button class="pill" onclick="loadData()" title="새로고침">↺</button>
  </div>
</div>

<!-- Setup Banner (Sheets 미연결 시) -->
<div class="setup-banner" id="setupBanner" style="display:none">
  <div class="inner">
    ⚙️ 연결이 설정되지 않았어요. 우상단 <strong>⚙️ 버튼</strong>에서 Apps Script URL을 입력해주세요.<br>
    단어는 Hermes에게 <code>食べる 먹다 단어장에 추가해줘</code> 라고 말하면 추가돼요.
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('cards')" id="tab-cards">카드</button>
  <button class="tab" onclick="switchTab('study')" id="tab-study">🎴 외우기</button>
  <button class="tab" onclick="switchTab('history')" id="tab-history">히스토리</button>
</div>

<!-- Toolbar (cards tab) -->
<div class="toolbar" id="toolbar-cards">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="단어 검색..." oninput="renderCards()">
  </div>
  <button class="filter-btn" id="starFilter" onclick="toggleStarFilter()">⭐ 중요만 보기</button>
  <button class="filter-btn" id="addSamplesBtn" onclick="addSamples()">➕ 예시 5개</button>
</div>

<!-- Stats -->
<div class="stats" id="stats-bar" style="display:none">
  <div class="stat">전체 <strong id="st-total">0</strong></div>
  <div class="stat">⭐ 중요 <strong id="st-starred">0</strong></div>
  <div class="stat">오늘 추가 <strong id="st-today">0</strong></div>
</div>

<!-- Cards -->
<div class="cards" id="cardsGrid"></div>

<!-- History -->
<div class="history-list" id="historyList" style="display:none"></div>

<!-- 외우기 (flashcard) -->
<div class="study" id="studyView" style="display:none">
  <div class="study-bar">
    <button class="filter-btn" id="studyStarFilter" onclick="toggleStudyStar()">⭐ 중요만</button>
    <button class="filter-btn" onclick="shuffleStudy()">🔀 섞기</button>
    <span class="count"><strong id="studyPos">0</strong> / <span id="studyTotal">0</span></span>
  </div>
  <div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="flashcard-inner">
      <div class="face front">
        <span class="fc-level" id="fcLevel"></span>
        <button class="fc-star" id="fcStar" onclick="studyToggleStarBtn(event)">☆</button>
        <div class="fc-word" id="fcWord"></div>
        <div class="fc-reading" id="fcReading"></div>
        <div class="fc-hint">탭하면 뜻 보기</div>
      </div>
      <div class="face back">
        <div class="fc-reading" id="fcReadingBack"></div>
        <div class="fc-meaning" id="fcMeaning"></div>
        <div class="fc-hint">탭하면 단어로</div>
      </div>
    </div>
  </div>
  <div class="study-nav">
    <button class="nav-btn" id="studyPrev" onclick="studyPrev()">← 이전</button>
    <button class="nav-btn flip" onclick="flipCard()">뒤집기</button>
    <button class="nav-btn" id="studyNext" onclick="studyNext()">다음 →</button>
  </div>
  <div class="study-done" id="studyEmpty" style="display:none">외울 단어가 없어요.</div>
</div>

<!-- Loading / Empty -->
<div class="loading" id="loadingEl" style="display:none">
  <div class="spinner"></div><br>불러오는 중...
</div>
<div class="empty" id="emptyEl" style="display:none">
  <p>아직 단어가 없어요.<br>Slack에서 추가해보세요!</p>
  <div class="cmd">/단어 食べる 먹다</div>
</div>

<!-- 파일 기반 설정 (선택) — config.js.example 참고. 없으면 무시됨 -->
<script src="config.js" onerror="this.remove()"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────
const CFG_KEY = 'tango_config';
// 읽기·쓰기 모두 Apps Script(gasUrl) 하나로 처리. 비밀이 아니라 기본값을 코드에 내장
// → 기기마다 설정할 필요 없음. 브라우저에 API 키 없음.
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzZ3Ttv5CQ_NcahVL35eeEuOOiwtPTHXWIeEEkfJAz5i9yAcaMsusdkTDgTykqkfOWR/exec';
// 우선순위: localStorage(⚙️ 입력) > config.js(window.TANGO_CONFIG) > 내장 기본값
let config = Object.assign(
  {},
  (typeof window.TANGO_CONFIG === 'object' && window.TANGO_CONFIG) || {},
  JSON.parse(localStorage.getItem(CFG_KEY) || '{}')
);
const gasUrl = () => config.gasUrl || DEFAULT_GAS_URL;

// ── STATE ─────────────────────────────────────────────────
let words    = [];   // { id, word, reading, meaning, level, starred, addedAt }
let history  = [];   // { word, meaning, action, at }
let showStarOnly = false;
let currentTab   = 'cards';

// ── CONFIG MODAL ──────────────────────────────────────────
function openModal() {
  document.getElementById('cfg-gas-url').value = config.gasUrl || '';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}
function saveConfig() {
  config = { gasUrl: document.getElementById('cfg-gas-url').value.trim() };
  localStorage.setItem(CFG_KEY, JSON.stringify(config));
  closeModal();
  loadData();
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

// ── LOAD DATA (Apps Script list) ─────────────────────────
async function loadData() {
  if (!gasUrl()) {
    document.getElementById('setupBanner').style.display = '';
    document.getElementById('emptyEl').style.display = '';
    document.getElementById('loadingEl').style.display = 'none';
    return;
  }
  document.getElementById('setupBanner').style.display = 'none';
  document.getElementById('loadingEl').style.display = '';
  document.getElementById('emptyEl').style.display = 'none';
  document.getElementById('cardsGrid').innerHTML = '';
  document.getElementById('historyList').innerHTML = '';

  try {
    // Apps Script가 시트를 소유자 권한으로 읽어 JSON 반환 → 브라우저엔 API 키 불필요
    const res  = await fetch(gasUrl() + '?action=list');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '목록을 불러오지 못했어요');

    // 날짜를 ISO로 정규화 (시트가 Date로 저장한 경우 대비)
    const toISO = s => { if (!s) return ''; const d = new Date(s); return isNaN(d) ? String(s) : d.toISOString(); };
    // { word, reading, meaning, level, starred, addedAt }
    words   = (data.words   || []).map((w, i) => ({ id: i, ...w, addedAt: toISO(w.addedAt) }));
    history = (data.history || []).map(h => ({ ...h, at: toISO(h.at) })).reverse(); // 최신 순

    renderAll();
  } catch(e) {
    document.getElementById('loadingEl').innerHTML = `<p style="color:var(--accent)">오류: ${e.message}</p>`;
  } finally {
    document.getElementById('loadingEl').style.display = 'none';
  }
}

// ── RENDER ────────────────────────────────────────────────
function renderAll() {
  updateStats();
  renderCards();
  renderHistory();
}

function updateStats() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('st-total').textContent   = words.length;
  document.getElementById('st-starred').textContent = words.filter(w=>w.starred).length;
  document.getElementById('st-today').textContent   = words.filter(w=>w.addedAt.startsWith(today)).length;
  document.getElementById('stats-bar').style.display = words.length ? '' : 'none';
}

function renderCards() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('cardsGrid');
  let filtered = words;

  if (showStarOnly) filtered = filtered.filter(w => w.starred);
  if (q) filtered = filtered.filter(w =>
    w.word.includes(q) || w.reading.includes(q) || w.meaning.toLowerCase().includes(q)
  );

  grid.innerHTML = '';
  if (!filtered.length) {
    document.getElementById('emptyEl').style.display = '';
    return;
  }
  document.getElementById('emptyEl').style.display = 'none';

  filtered.forEach(w => {
    const card = document.createElement('div');
    card.className = 'card' + (w.starred ? ' starred' : '');
    const dateStr = w.addedAt ? w.addedAt.slice(0,10) : '';
    card.innerHTML = `
      ${w.level ? `<span class="card-level">${w.level}</span>` : ''}
      <div class="card-word">${w.word}</div>
      <div class="card-reading">${w.reading}</div>
      <div class="card-meaning">${w.meaning}</div>
      <div class="card-meta">
        <span class="card-date">${dateStr}</span>
        <span class="card-actions">
          <button class="del-btn" onclick="deleteWord(${w.id}, event)" title="삭제">🗑</button>
          <button class="star-btn" onclick="toggleStar(${w.id}, event)" title="중요 마킹">
            ${w.starred ? '⭐' : '☆'}
          </button>
        </span>
      </div>`;
    grid.appendChild(card);
  });
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if (!history.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:14px">히스토리가 없어요</div>';
    return;
  }
  history.slice(0, 100).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const badgeClass = { add:'badge-add', star:'badge-star', unstar:'badge-unstar', delete:'badge-del' }[h.action] || 'badge-unstar';
    const badgeText  = { add:'추가', star:'⭐ 중요', unstar:'☆ 해제', delete:'🗑 삭제' }[h.action] || h.action;
    const timeStr = h.at ? new Date(h.at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    item.innerHTML = `
      <div>
        <div class="history-word">${h.word}</div>
        <div class="history-meaning">${h.meaning}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="history-badge ${badgeClass}">${badgeText}</span>
        <span class="history-time">${timeStr}</span>
      </div>`;
    list.appendChild(item);
  });
}

// ── STAR TOGGLE ──────────────────────────────────────────
async function toggleStar(id, e) {
  e.stopPropagation();
  const w = words[id];
  if (!w) return;
  w.starred = !w.starred;

  // UI는 즉시 반영, 저장은 Apps Script로 fire-and-forget (응답 안 기다림)
  if (gasUrl()) {
    fetch(gasUrl() + '?action=star&word=' + encodeURIComponent(w.word) + '&starred=' + w.starred)
      .catch(() => {});
  }

  renderAll();
}

// ── DELETE ───────────────────────────────────────────────
async function deleteWord(id, e) {
  e.stopPropagation();
  const w = words[id];
  if (!w) return;
  if (!confirm(`"${w.word}" 단어를 삭제할까요?`)) return;
  try {
    await fetch(gasUrl() + '?action=delete&word=' + encodeURIComponent(w.word));
  } catch (err) {}
  loadData();   // 시트 기준으로 다시 읽어 id 재정렬
}

// ── 예시 단어 5개 추가 ────────────────────────────────────
const SAMPLE_POOL = [
  { word:'水',     reading:'みず',       meaning:'물',          level:'N5' },
  { word:'学校',   reading:'がっこう',   meaning:'학교',        level:'N5' },
  { word:'時間',   reading:'じかん',     meaning:'시간',        level:'N5' },
  { word:'友達',   reading:'ともだち',   meaning:'친구',        level:'N5' },
  { word:'天気',   reading:'てんき',     meaning:'날씨',        level:'N5' },
  { word:'飲む',   reading:'のむ',       meaning:'마시다',      level:'N5' },
  { word:'見る',   reading:'みる',       meaning:'보다',        level:'N5' },
  { word:'行く',   reading:'いく',       meaning:'가다',        level:'N5' },
  { word:'買う',   reading:'かう',       meaning:'사다',        level:'N5' },
  { word:'大きい', reading:'おおきい',   meaning:'크다',        level:'N5' },
  { word:'高い',   reading:'たかい',     meaning:'높다/비싸다', level:'N5' },
  { word:'新しい', reading:'あたらしい', meaning:'새롭다',      level:'N5' },
  { word:'元気',   reading:'げんき',     meaning:'건강함/활기', level:'N5' },
  { word:'有名',   reading:'ゆうめい',   meaning:'유명함',      level:'N5' },
  { word:'いつも', reading:'',           meaning:'항상',        level:'N5' },
  { word:'ゆっくり', reading:'',         meaning:'천천히',      level:'N5' },
  { word:'旅行',   reading:'りょこう',   meaning:'여행',        level:'N4' },
  { word:'約束',   reading:'やくそく',   meaning:'약속',        level:'N4' },
  { word:'練習',   reading:'れんしゅう', meaning:'연습',        level:'N4' },
  { word:'説明',   reading:'せつめい',   meaning:'설명',        level:'N4' },
];
async function addSamples() {
  const btn = document.getElementById('addSamplesBtn');
  const have = new Set(words.map(w => w.word));
  const pool = SAMPLE_POOL.filter(w => !have.has(w.word));
  for (let i = pool.length - 1; i > 0; i--) {           // 셔플
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const pick = pool.slice(0, 5);
  if (!pick.length) { alert('추가할 새 예시가 없어요 (이미 다 있어요).'); return; }

  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '추가 중…';
  for (const w of pick) {
    const qs = '?action=add'
      + '&word='    + encodeURIComponent(w.word)
      + '&reading=' + encodeURIComponent(w.reading)
      + '&meaning=' + encodeURIComponent(w.meaning)
      + '&level='   + encodeURIComponent(w.level);
    try { await fetch(gasUrl() + qs); } catch (err) {}
  }
  btn.disabled = false;
  btn.textContent = orig;
  loadData();
}

// ── TABS ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  document.getElementById('toolbar-cards').style.display = tab === 'cards' ? '' : 'none';
  document.getElementById('cardsGrid').style.display      = tab === 'cards' ? '' : 'none';
  document.getElementById('historyList').style.display    = tab === 'history' ? '' : 'none';
  document.getElementById('studyView').style.display      = tab === 'study' ? '' : 'none';
  document.getElementById('stats-bar').style.display      = tab === 'cards' && words.length ? '' : 'none';
  document.getElementById('emptyEl').style.display        = 'none';

  if (tab === 'study') buildStudy();
}

// ── STAR FILTER ──────────────────────────────────────────
function toggleStarFilter() {
  showStarOnly = !showStarOnly;
  document.getElementById('starFilter').classList.toggle('active', showStarOnly);
  renderCards();
}

// ── 외우기(flashcard) 모드 ──────────────────────────────
let studyOrder    = [];     // 학습 대상 word 객체 배열 (words의 참조)
let studyIdx      = 0;
let studyStarOnly = false;

function buildStudy() {
  studyOrder = studyStarOnly ? words.filter(w => w.starred) : words.slice();
  studyIdx = 0;
  renderStudy();
}
function renderStudy() {
  const fc    = document.getElementById('flashcard');
  const nav   = document.querySelector('.study-nav');
  const empty = document.getElementById('studyEmpty');
  const total = studyOrder.length;
  document.getElementById('studyTotal').textContent = total;

  if (!total) {
    fc.style.display = nav.style.display = 'none';
    empty.style.display = '';
    document.getElementById('studyPos').textContent = '0';
    return;
  }
  fc.style.display = ''; nav.style.display = ''; empty.style.display = 'none';
  if (studyIdx >= total) studyIdx = total - 1;

  const w = studyOrder[studyIdx];
  fc.classList.remove('flipped');   // 새 카드는 항상 앞면(단어)부터
  document.getElementById('fcWord').textContent        = w.word;
  document.getElementById('fcReading').textContent     = w.reading || '';
  document.getElementById('fcReadingBack').textContent = w.reading || '';
  document.getElementById('fcMeaning').textContent     = w.meaning || '';
  document.getElementById('fcLevel').textContent       = w.level || '';
  const star = document.getElementById('fcStar');
  star.textContent = w.starred ? '⭐' : '☆';
  star.classList.toggle('on', !!w.starred);

  document.getElementById('studyPos').textContent  = String(studyIdx + 1);
  document.getElementById('studyPrev').disabled = studyIdx === 0;
  document.getElementById('studyNext').disabled = studyIdx === total - 1;
}
function flipCard()  { document.getElementById('flashcard').classList.toggle('flipped'); }
function studyNext() { if (studyIdx < studyOrder.length - 1) { studyIdx++; renderStudy(); } }
function studyPrev() { if (studyIdx > 0) { studyIdx--; renderStudy(); } }
function shuffleStudy() {
  for (let i = studyOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyOrder[i], studyOrder[j]] = [studyOrder[j], studyOrder[i]];
  }
  studyIdx = 0;
  renderStudy();
}
function toggleStudyStar() {
  studyStarOnly = !studyStarOnly;
  document.getElementById('studyStarFilter').classList.toggle('active', studyStarOnly);
  buildStudy();
}
function studyToggleStarBtn(e) {
  e.stopPropagation();                 // 카드 뒤집힘 방지
  const w = studyOrder[studyIdx];
  if (w) { toggleStar(w.id, e); renderStudy(); }   // 기존 토글 재사용(시트 저장)
}
document.addEventListener('keydown', e => {
  if (currentTab !== 'study') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'ArrowRight') studyNext();
  else if (e.key === 'ArrowLeft')  studyPrev();
});

// ── INIT ─────────────────────────────────────────────────
loadData();
